<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>车牌识别系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{padding:30px;background:#f5f5f5;}

        .main{
            display:flex;
            width:100%;
            height:85vh;
            gap:20px;
        }

        /* 左侧：上传区 50% */
        .left{
            width:50%;
            background:white;
            border-radius:10px;
            border:2px dashed #409eff;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            overflow:hidden;
        }

        /* 右侧 */
        .right{
            width:50%;
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .result-box{
            flex:1;
            background:white;
            border-radius:10px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            border:2px solid #67c23a;
        }

        .record-box{
            flex:1;
            background:white;
            border-radius:10px;
            padding:20px;
            border:2px solid #999;
            position:relative;
        }

        /* 关键：图片自适应界面高度 */
        #preview{
            max-height: 90%;
            width: auto;
            display: none;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .plate{font-size:46px;font-weight:bold;color:red;}
        .down-btn{
            position:absolute;
            top:15px;
            right:20px;
            background:#409eff;
            color:white;
            border:none;
            padding:6px 12px;
            border-radius:5px;
            cursor:pointer;
        }
        .record-list{
            margin-top:15px;
            height:80%;
            overflow-y:auto;
        }
        .item{
            padding:8px 10px;
            background:#f5f9ff;
            margin-bottom:8px;
            border-radius:5px;
        }
    </style>
</head>

<body>
    <h2 style="text-align:center;margin-bottom:20px;">车牌识别系统</h2>
    <div class="main">
        <!-- 左侧上传区 -->
        <div class="left" onclick="document.getElementById('file').click()">
            <img id="preview">
            <div style="font-size:18px;color:#666;">点击上传车牌图片</div>
            <input type="file" id="file" accept="image/*" hidden>
        </div>

        <!-- 右侧：结果 + 记录 -->
        <div class="right">
            <div class="result-box">
                <h3>识别结果</h3>
                <div id="plate" class="plate">等待识别...</div>
            </div>

            <div class="record-box">
                <button class="down-btn" onclick="downloadRecord()">下载Excel</button>
                <h3>识别记录</h3>
                <div class="record-list" id="recordList"></div>
            </div>
        </div>
    </div>

    <script>
        function loadRecords(){
            fetch("/get_records").then(res=>res.json()).then(data=>{
                let html = "";
                data.forEach(item=>{
                    html += `<div class="item">${item.time}  —  ${item.plate}</div>`;
                });
                document.getElementById("recordList").innerHTML = html;
            })
        }

        // 上传识别
        document.getElementById("file").onchange = function(e){
            let file = e.target.files[0];
            if(!file) return;

            // 前端预览自适应
            let img = document.getElementById("preview");
            img.src = URL.createObjectURL(file);
            img.style.display = "block";

            document.getElementById("plate").innerText = "识别中...";

            let fd = new FormData();
            fd.append("file", file);

            fetch("/upload",{method:"POST",body:fd})
            .then(res=>res.json())
            .then(data=>{
                if(data.code===200){
                    document.getElementById("plate").innerText = data.plate;
                    loadRecords();
                }
            })
        }

        // 下载
        function downloadRecord(){
            window.open("/download");
        }

        window.onload = loadRecords;
    </script>
</body>
